services:
  db:
    image: postgres:16-alpine
    container_name: svoy-bot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-svoy_bot}
      POSTGRES_USER: ${POSTGRES_USER:-svoy_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-svoy_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-svoy_user} -d ${POSTGRES_DB:-svoy_bot}"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
    container_name: svoy-bot-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-svoy_user}:${POSTGRES_PASSWORD:-svoy_password}@db:5432/${POSTGRES_DB:-svoy_bot}
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8000}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      MAIL_TO: ${MAIL_TO:-inform@mb180.ru}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  postgres_data:
