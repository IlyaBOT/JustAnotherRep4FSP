<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Чат-бот «СВОй»</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="page-shell">
    <div class="widget-card">
      <header class="widget-header">
        <div>
          <p class="eyebrow">Центр «Мой бизнес»</p>
          <h1>Чат-бот «СВОй»</h1>
          <p class="subtitle">Навигация по мерам поддержки и социальному контракту</p>
        </div>
        <button id="resetChatBtn" class="ghost-btn" type="button">Новая сессия</button>
      </header>

      <main id="messages" class="messages"></main>

      <form id="chatForm" class="chat-form">
        <input
          id="documentUploadInput"
          type="file"
          accept=".pdf,.jpg,.jpeg,.png,.doc,.docx"
          multiple
          hidden
        />
        <button id="uploadDocumentsBtn" class="ghost-btn upload-trigger-btn" type="button" hidden>Загрузить файлы</button>
        <input id="chatInput" type="text" placeholder="Напишите вопрос или выберите кнопку ниже" autocomplete="off" />
        <button class="send-btn" type="submit">Отправить</button>
      </form>

      <footer class="widget-footer">
        <div class="footer-grid">
          <div>
            <strong>Контакты</strong>
            <p>+7 (949) 568-44-53<br>inform@mb180.ru</p>
          </div>
          <div>
            <strong>Адреса</strong>
            <p>Донецк, пр. Дзержинского, 13<br>Мариуполь, пр. Металлургов, 88А</p>
          </div>
        </div>
      </footer>
    </div>
  </div>

  <template id="messageTemplate">
    <div class="message-row">
      <div class="message-bubble"></div>
      <div class="button-row"></div>
    </div>
  </template>

  <script src="/static/app.js"></script>
</body>
</html>
